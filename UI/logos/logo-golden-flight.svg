<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="100%" height="100%">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e3cfb3" />
      <stop offset="100%" stop-color="#d1b48c" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8fa874" />
      <stop offset="100%" stop-color="#5a7043" />
    </linearGradient>
  </defs>
  <rect width="400" height="120" rx="16" fill="#090e07" />
  
  <!-- Logo Icon: 3 sails/wings in gold + sea waves in green -->
  <g transform="translate(15, 10)">
    <!-- Sea waves (Global trade routes) -->
    <path d="M15 80c10-5 18-5 28 0s18 5 28 0c8-4 12-4 19 0" stroke="url(#greenGrad)" stroke-width="2.5" stroke-linecap="round" fill="none" />
    <path d="M22 88c8-4 15-4 23 0s15 4 23 0" stroke="url(#greenGrad)" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.6" />
    
    <!-- Wing/Sail 1 (Left) -->
    <path d="M28 72c0-20 8-36 22-48-5 16-3 34 8 48Z" fill="url(#goldGrad)" opacity="0.7" />
    <!-- Wing/Sail 2 (Center) -->
    <path d="M42 74c0-25 10-44 26-58-6 20-2 42 10 58Z" fill="url(#goldGrad)" />
    <!-- Wing/Sail 3 (Right) -->
    <path d="M56 76c0-22 8-38 22-50-5 18-2 36 8 50Z" fill="url(#goldGrad)" opacity="0.85" />
  </g>

  <!-- Brand Typography -->
  <text x="130" y="58" font-family="'Outfit', 'Inter', sans-serif" font-size="24" font-weight="800" fill="#f2f5f0" letter-spacing="0.5">
    GlobalTrade<tspan fill="url(#goldGrad)">Buddy</tspan>
  </text>
  <text x="130" y="80" font-family="'Inter', sans-serif" font-size="10" font-weight="500" fill="#9aa693" letter-spacing="3.5">
    EMPOWERING EXPORTING SAILS
  </text>
</svg>