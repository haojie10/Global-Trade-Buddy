<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="100%" height="100%">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e3cfb3" />
      <stop offset="100%" stop-color="#d1b48c" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8fa874" />
      <stop offset="100%" stop-color="#5a7043" />
    </linearGradient>
  </defs>
  <rect width="400" height="120" rx="16" fill="#090e07" />
  
  <!-- Logo Icon: Navigator Compass + T (Trade) shape -->
  <g transform="translate(15, 10)">
    <!-- Outer Compass Rings -->
    <circle cx="50" cy="50" r="38" stroke="url(#greenGrad)" stroke-width="1.5" fill="none" opacity="0.6" />
    <circle cx="50" cy="50" r="32" stroke="url(#goldGrad)" stroke-width="0.75" stroke-dasharray="3 3" fill="none" />
    <!-- Compass ticks -->
    <path d="M50 12v6M50 82v6M12 50h6M82 50h6M23 23l4 4M77 77l4 4M23 77l4-4M77 23l4-4" stroke="url(#greenGrad)" stroke-width="1.5" stroke-linecap="round" />
    <!-- Stylized Compass Needle (3D Arrow / T) -->
    <path d="M50 16L38 46l12-6 12 6Z" fill="url(#goldGrad)" />
    <!-- Shadow side of needle for 3D effect -->
    <path d="M50 16v30L62 46Z" fill="#bfa37c" opacity="0.8" />
    <path d="M50 84L42 54l8 6 8-6Z" fill="url(#greenGrad)" />
  </g>

  <!-- Brand Typography -->
  <text x="130" y="58" font-family="'Outfit', 'Inter', sans-serif" font-size="24" font-weight="800" fill="#f2f5f0" letter-spacing="0.5">
    GlobalTrade<tspan fill="url(#goldGrad)">Buddy</tspan>
  </text>
  <text x="130" y="80" font-family="'Inter', sans-serif" font-size="10" font-weight="500" fill="#9aa693" letter-spacing="3.5">
    NAVIGATING THE WORLD TRADE
  </text>
</svg>