<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="100%" height="100%">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e3cfb3" />
      <stop offset="100%" stop-color="#d1b48c" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8fa874" />
      <stop offset="100%" stop-color="#5a7043" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background for preview context -->
  <!-- Logo Icon: G shape + Global Network -->
  <g transform="translate(15, 10)">
    <!-- Sphere Latitudes & Longitudes -->
    <circle cx="50" cy="50" r="38" stroke="url(#greenGrad)" stroke-width="1" stroke-dasharray="2 3" fill="none" opacity="0.4" />
    <path d="M12 50h76M50 12v76M19 32c10 5 20 8 31 8s21-3 31-8M19 68c10-5 20-8 31-8s21 3 31 8" stroke="url(#greenGrad)" stroke-width="1" fill="none" opacity="0.3" />
    <!-- G Orbit (Global Route) -->
    <path d="M78 30C70 20 56 14 50 14 28 14 12 30 12 50s16 36 38 36c18 0 31-10 36-22H48" stroke="url(#goldGrad)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)" />
    <!-- Connection Nodes (Obsidian Graph elements) - Properly aligned closed loop -->
    <line x1="78" y1="30" x2="84" y2="52" stroke="#d1b48c" stroke-width="1" stroke-dasharray="2 2" />
    <line x1="84" y1="52" x2="48" y2="64" stroke="#d1b48c" stroke-width="1" stroke-dasharray="2 2" />
    <line x1="48" y1="64" x2="52" y2="36" stroke="#d1b48c" stroke-width="1" stroke-dasharray="2 2" />
    <line x1="52" y1="36" x2="78" y2="30" stroke="#d1b48c" stroke-width="1" stroke-dasharray="2 2" />
    
    <circle cx="78" cy="30" r="4" fill="#e3cfb3" />
    <circle cx="84" cy="52" r="4" fill="#8fa874" />
    <circle cx="48" cy="64" r="3.5" fill="#e3cfb3" />
    <circle cx="52" cy="36" r="3" fill="#8fa874" />
  </g>

  <!-- Brand Typography -->
  <text x="130" y="58" font-family="'Outfit', 'Inter', sans-serif" font-size="24" font-weight="800" fill="#0f172a" letter-spacing="0.5">
    GlobalTrade<tspan fill="url(#goldGrad)">Buddy</tspan>
  </text>
  <text x="130" y="80" font-family="'Inter', sans-serif" font-size="10" font-weight="500" fill="#9aa693" letter-spacing="3.5">
    GLOBAL INTELLIGENCE NETWORK
  </text>
</svg>